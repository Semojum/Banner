server {
    # Cloud Run 은 기본적으로 컨테이너의 8080 포트로 트래픽을 보냅니다.
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # gzip 압축 (HTML/CSS/JS/SVG)
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # 라우팅: 존재하지 않는 경로는 index.html 로 폴백 (단일 페이지)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 이미지: 장기 캐시
    location /IMG/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # HTML: 캐시하지 않음 (배포 시 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
